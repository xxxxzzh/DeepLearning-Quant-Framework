name: Daily Quant Report

on:
  push:
    branches: [ main ]  # 当你提交代码时运行
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自动运行一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装量化依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行量化引擎并输出报告
    # 这一步就是代替你手动输入 python main.py
      run: python main.py